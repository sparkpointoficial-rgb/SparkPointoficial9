<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkPoint Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff9d;
            --gold: #ffd700;
            --telegram-blue: #0088cc;
            --bg-dark: #0f0f1b;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a1a2e, transparent);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0 10px 20px;
            min-height: 100vh;
        }

        /* Бегущая строка */
        .ticker {
            background: linear-gradient(90deg, #111133, #1a1a2e);
            color: var(--neon-green);
            font-weight: bold;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid rgba(0,255,157,0.15);
            text-align: center;
            font-size: 1rem;
        }
        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 35s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .container { max-width: 460px; margin: 0 auto; }

        .header { text-align: center; margin: 20px 0 30px; position: relative; }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .logo span { font-size: 2.8rem; filter: drop-shadow(0 0 10px var(--gold)); }

        /* Анимированный логотип рядом с названием */
        .logo-node {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid var(--neon-green);
            position: relative;
            animation: rotate 10s linear infinite;
        }
        .logo-node::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold);
            animation: pulse 2.5s infinite alternate;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
        @keyframes pulse { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.3); } }

        .wallet-addr {
            font-size: 0.85rem;
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 12px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-family: monospace;
        }

        /* Остальной стиль без изменений */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .stat-value { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .matrix-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            max-height: 520px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .matrix-box::-webkit-scrollbar { width: 6px; }
        .matrix-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .lvl-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 24px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 10px;
        }
        .lvl-header:first-child { margin-top: 0; }
        .lvl-name { font-size: 1rem; font-weight: bold; color: var(--neon-green); }
        .lvl-slots { font-size: 0.8rem; color: #aaa; }

        .dots { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin: 12px 0; 
        }
        .dot {
            width: 26px; height: 26px; border-radius: 50%;
            background: #1a1a2e; border: 1px solid #333;
            transition: all 0.4s ease;
            position: relative;
        }
        .dot.active {
            background: var(--neon-green);
            box-shadow: 0 0 16px var(--neon-green);
            border: none;
            transform: scale(1.08);
        }

        .box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            font-size: 0.95rem; text-transform: uppercase;
            display: block; text-decoration: none; text-align: center;
            box-sizing: border-box;
        }
        .btn-green { background: var(--neon-green); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3); }
        .btn-green:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 255, 157, 0.45); }
        
        .btn-tg { 
            background: var(--telegram-blue); color: #fff; margin-top: 12px; 
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        input {
            width: 100%; padding: 14px; background: #000; border: 1px solid #333;
            border-radius: 12px; color: #fff; margin: 12px 0; box-sizing: border-box;
            font-family: monospace; font-size: 0.95rem;
        }

        .inviter-info { text-align: center; font-size: 0.9rem; color: #aaa; margin: 15px 0; padding: 12px; border-radius: 12px; background: rgba(0,255,157,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- Бегущая строка -->
<div class="ticker">
    <span>SPARKPOINT PREMIUM — PRIVATE ACCESS • LIMITED SLOTS • ACTIVATE NOW • SPARKPOINT PREMIUM — PRIVATE ACCESS • LIMITED SLOTS • ACTIVATE NOW • </span>
</div>

<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-node"></div> <🏦-- Анимированный логотип -->
            SPARKPOINT
        </div>
        <div id="addrDisplay" class="wallet-addr hidden">Not Connected</div>
        <button id="connBtn" class="btn btn-green" style="margin-top: 18px;" onclick="connect()">Connect Wallet</button>
        <a href="https://t.me/spartpoint/32" target="_blank" class="btn btn-tg">📖 Как оплатить? (Инструкция)</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">🚀 Level</span>
            <div class="stat-value" id="valLvl">-</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">💎 Internal Balance</span>
            <div class="stat-value" id="valBal">0.0000 BNB</div>
        </div>
    </div>

    <div class="matrix-box" id="matrixBox"></div>

    <div id="inviterBox" class="inviter-info hidden">
        🤝 Пригласил: <br><span id="invAddr" style="color: var(--neon-green); font-family: monospace;"></span>
    </div>

    <div id="regArea" class="box">
        <label style="font-size: 0.85rem; color: #aaa;">REFERRER ADDRESS</label>
        <input type="text" id="refInput" placeholder="0x000...0000">
        <button class="btn btn-green" onclick="register()">Activate Matrix (0.001 BNB)</button>
    </div>

    <div id="linkArea" class="box hidden">
        <label style="font-size: 0.85rem; color: #aaa;">ВАША ПРИГЛАСИТЕЛЬНАЯ ССЫЛКА (макс 2 чел.)</label>
        <input type="text" id="refLink" readonly>
        <button id="copyBtn" class="btn btn-green" onclick="copy()">Копировать ссылку 🔗</button>
    </div>

    <div id="adminPanel" class="box hidden" style="border-color: var(--gold);">
        <b style="color: var(--gold);">👑 ADMIN PANEL</b>
        <input type="text" id="admU" placeholder="User Address (0x...)">
        <input type="text" id="admR" placeholder="Referrer Address (0x...)">
        <button class="btn" style="background: var(--gold); color: #000;" onclick="adminAdd()">Add Free User</button>
    </div>
</div>

<script>
// Весь твой оригинальный скрипт без изменений
const LEVEL_SLOTS = [0, 2, 6, 14, 2, 6, 14, 2, 6, 14];

const CONTRACT_ADDR = '0x2c4326c0577e8Ef8679B302eAd3603Df8224B7ed';

const ABI = [
    {"inputs":[{"internalType":"address","name":"_user","type":"address"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"adminAddUser","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"address","name":"_referrer","type":"address"}],"name":"register","outputs":[],"stateMutability":"payable","type":"function"},
    {"inputs":[],"name":"admin","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[
        {"internalType":"uint256","name":"level","type":"uint256"},
        {"internalType":"address","name":"referrer","type":"address"},
        {"internalType":"uint256","name":"partnersCount","type":"uint256"},
        {"internalType":"uint256","name":"structureCount","type":"uint256"},
        {"internalType":"uint256","name":"internalBalance","type":"uint256"},
        {"internalType":"bool","name":"exists","type":"bool"}
    ],"stateMutability":"view","type":"function"}
];

let web3, contract, userAccount;

async function connect() {
    if (!window.ethereum) return alert("Установите MetaMask / Trust Wallet");
    try {
        const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAccount = accs[0];
        web3 = new Web3(window.ethereum);
        contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);

        document.getElementById('connBtn').classList.add('hidden');
        document.getElementById('addrDisplay').classList.remove('hidden');
        document.getElementById('addrDisplay').innerText = 
            userAccount.substring(0,6) + '...' + userAccount.substring(38);

        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Ошибка подключения");
    }
}

async function updateDashboard() {
    if (!userAccount) return;

    try {
        const data = await contract.methods.users(userAccount).call();
        const adminAddr = await contract.methods.admin().call();

        if (userAccount.toLowerCase() === adminAddr.toLowerCase()) {
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        if (data.exists) {
            document.getElementById('regArea').classList.add('hidden');
            document.getElementById('linkArea').classList.remove('hidden');

            document.getElementById('valLvl').innerText = data.level;
            document.getElementById('valBal').innerText = 
                parseFloat(web3.utils.fromWei(data.internalBalance || 0, 'ether')).toFixed(4) + " BNB";

            document.getElementById('inviterBox').classList.remove('hidden');
            const ref = data.referrer;
            document.getElementById('invAddr').innerText = 
                ref === '0x0000000000000000000000000000000000000000' ? 'Нет' : 
                ref.substring(0,8) + '...' + ref.substring(36);

            renderStructure(parseInt(data.level), parseInt(data.partnersCount || 0), parseInt(data.structureCount || 0));

            const partners = parseInt(data.partnersCount || 0);
            const linkInput = document.getElementById('refLink');
            const copyBtn = document.getElementById('copyBtn');

            if (partners >= 2) {
                linkInput.value = "ЛИМИТ 2/2 ДОСТИГНУТ";
                linkInput.style.color = "#ff5555";
                copyBtn.innerText = "❌ Лимит исчерпан";
                copyBtn.disabled = true;
                copyBtn.style.background = "#222";
                copyBtn.style.color = "#666";
            } else {
                const link = window.location.origin + window.location.pathname + "?ref=" + userAccount;
                linkInput.value = link;
                linkInput.style.color = "#fff";
                copyBtn.disabled = false;
                copyBtn.innerText = "Копировать ссылку 🔗";
                copyBtn.style.background = "var(--neon-green)";
                copyBtn.style.color = "#000";
            }
        }
    } catch(e) {
        console.error(e);
    }
}

function renderStructure(currentLevel, partnersCount, structureCount) {
    const container = document.getElementById('matrixBox');
    container.innerHTML = '';

    let filledL1 = Math.min(partnersCount, LEVEL_SLOTS[1]);
    let remaining = structureCount;

    for (let lvl = 1; lvl <= 9; lvl++) {
        const slots = LEVEL_SLOTS[lvl];

        const header = document.createElement('div');
        header.className = 'lvl-header';
        header.innerHTML = `
            <span class="lvl-name">LEVEL ${lvl}</span>
            <span class="lvl-slots">${slots} SLOTS</span>
        `;
        container.appendChild(header);

        const dotsDiv = document.createElement('div');
        dotsDiv.className = 'dots';

        let filledThisLevel = 0;

        if (lvl === 1) {
            filledThisLevel = filledL1;
        } else {
            filledThisLevel = Math.min(remaining, slots);
            remaining = Math.max(0, remaining - filledThisLevel * 2);
        }

        for (let i = 0; i < slots; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (i < filledThisLevel) dot.classList.add('active');
            dotsDiv.appendChild(dot);
        }

        container.appendChild(dotsDiv);

        if (lvl > currentLevel) {
            header.style.opacity = '0.5';
            dotsDiv.style.opacity = '0.4';
        }
    }
}

async function register() {
    if (!userAccount) return alert("Сначала подключите кошелёк");

    let referrer = document.getElementById('refInput').value.trim();
    if (!referrer || !web3.utils.isAddress(referrer)) {
        referrer = '0x0000000000000000000000000000000000000000';
    }

    try {
        await contract.methods.register(referrer).send({
            from: userAccount,
            value: web3.utils.toWei('0.001', 'ether')
        });
        alert("Пакет активирован!");
        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Ошибка: " + (e.message || "Транзакция отклонена"));
    }
}

async function adminAdd() {
    if (!userAccount) return;
    const userAddr = document.getElementById('admU').value.trim();
    const refAddr = document.getElementById('admR').value.trim();

    if (!web3.utils.isAddress(userAddr) || !web3.utils.isAddress(refAddr)) {
        return alert("Некорректный адрес");
    }

    try {
        await contract.methods.adminAddUser(userAddr, refAddr).send({ from: userAccount });
        alert("Пользователь добавлен бесплатно");
        updateDashboard();
    } catch(e) {
        alert("Ошибка: " + e.message);
    }
}

function copy() {
    const input = document.getElementById('refLink');
    if (input.value.includes("ЛИМИТ")) return;
    input.select();
    navigator.clipboard.writeText(input.value);
    alert("Ссылка скопирована!");
}

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('ref')) {
        document.getElementById('refInput').value = params.get('ref');
    }
};
</script>
</body>
</html>
