<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoCapital — Private Node</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        :root {
            --neon: #00f7ff;
            --gold: #ffd700;
            --bg: #0b0b14;
            --card: rgba(15,15,35,0.75);
        }
        body {
            background: var(--bg);
            color: #e0f4ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
        }
        .ticker {
            background: rgba(0,247,255,0.08);
            color: var(--neon);
            font-weight: 600;
            padding: 8px 0;
            text-align: center;
            font-size: 0.95rem;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker span {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .container { max-width: 460px; margin: 0 auto; padding: 15px; }

        .header { text-align: center; padding: 25px 0 15px; }
        .logo {
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00f7ff, #ffd700);
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .node {
            width: 42px; height: 42px;
            border: 3px solid var(--neon);
            border-radius: 50%;
            position: relative;
            animation: spin 8s linear infinite;
        }
        .node::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold);
            animation: pulse 2s infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 50% { transform: translate(-50%,-50%) scale(1.3); } }

        .wallet-addr {
            background: rgba(255,215,0,0.1);
            color: var(--gold);
            padding: 10px 18px;
            border-radius: 30px;
            font-family: monospace;
            margin: 12px auto;
            display: inline-block;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
        .stat-card {
            background: var(--card);
            border: 1px solid rgba(0,247,255,0.2);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 0 25px rgba(0,247,255,0.3); }

        .matrix-box {
            background: var(--card);
            border: 1px solid rgba(0,247,255,0.2);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            max-height: 480px;
            overflow-y: auto;
        }
        .dot {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #111122;
            border: 1px solid #333366;
            transition: all 0.4s;
        }
        .dot.active {
            background: #00f7ff;
            box-shadow: 0 0 18px #00f7ff;
            animation: activePulse 1.5s infinite;
        }
        @keyframes activePulse { 50% { transform: scale(1.15); } }

        .btn {
            width: 100%;
            padding: 17px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
        }
        .btn-green {
            background: linear-gradient(90deg, #00f7ff, #00c8ff);
            color: #000;
            box-shadow: 0 8px 25px rgba(0,247,255,0.4);
        }
        .btn-green:hover { transform: scale(1.04); }

        .inviter-info { background: rgba(0,247,255,0.08); padding: 14px; border-radius: 14px; text-align: center; margin: 15px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="ticker">
    <span>CRYPTOCAPITAL PRIVATE NODE ROUND 2026 • ONLY 5000 SLOTS LEFT • PRICE INCREASE IN 48H • </span>
</div>

<div class="container">
    <div class="header">
        <div class="logo">
            <div class="node"></div>
            CRYPTOCAPITAL
        </div>
        <div id="addrDisplay" class="wallet-addr hidden">Not Connected</div>
        <button id="connBtn" class="btn btn-green" onclick="connect()">CONNECT WALLET</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div style="color:#aaa;font-size:0.85rem;">LEVEL</div>
            <div id="valLvl" style="font-size:2rem;font-weight:800;color:#00f7ff;">—</div>
        </div>
        <div class="stat-card">
            <div style="color:#aaa;font-size:0.85rem;">INTERNAL BALANCE</div>
            <div id="valBal" style="font-size:2rem;font-weight:800;color:#ffd700;">0.0000 BNB</div>
        </div>
    </div>

    <div class="matrix-box" id="matrixBox"></div>

    <div id="inviterBox" class="inviter-info hidden">
        Invited by: <span id="invAddr" style="color:#00f7ff;font-family:monospace;"></span>
    </div>

    <div id="regArea" class="box" style="background:var(--card);padding:20px;border-radius:20px;margin:20px 0;">
        <label style="color:#aaa;font-size:0.9rem;">REFERRER</label>
        <input type="text" id="refInput" placeholder="0x...">
        <button class="btn btn-green" onclick="register()">ACTIVATE NODE (0.001 BNB)</button>
    </div>

    <div id="linkArea" class="box hidden" style="background:var(--card);padding:20px;border-radius:20px;margin:20px 0;">
        <label style="color:#aaa;font-size:0.9rem;">YOUR INVITE LINK</label>
        <input type="text" id="refLink" readonly>
        <button id="copyBtn" class="btn btn-green" onclick="copy()">COPY LINK</button>
    </div>

    <div id="adminPanel" class="box hidden" style="border:2px solid #ffd700;">
        <b style="color:#ffd700;display:block;margin-bottom:12px;">ADMIN CONTROL</b>
        <input type="text" id="admU" placeholder="User Address (0x...)">
        <input type="text" id="admR" placeholder="Referrer Address (0x...)">
        <button class="btn" style="background:linear-gradient(90deg,#ffd700,#ffcc00);color:#000;margin-top:12px;" onclick="adminAdd()">Add Free User</button>
    </div>
</div>

<script>
const LEVEL_SLOTS = [0, 2, 6, 14, 2, 6, 14, 2, 6, 14];
const CONTRACT_ADDR = '0x2c4326c0577e8Ef8679B302eAd3603Df8224B7ed';

const ABI = [
    {"inputs":[{"internalType":"address","name":"_user","type":"address"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"adminAddUser","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"address","name":"_referrer","type":"address"}],"name":"register","outputs":[],"stateMutability":"payable","type":"function"},
    {"inputs":[],"name":"admin","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[
        {"internalType":"uint256","name":"level","type":"uint256"},
        {"internalType":"address","name":"referrer","type":"address"},
        {"internalType":"uint256","name":"partnersCount","type":"uint256"},
        {"internalType":"uint256","name":"structureCount","type":"uint256"},
        {"internalType":"uint256","name":"internalBalance","type":"uint256"},
        {"internalType":"bool","name":"exists","type":"bool"}
    ],"stateMutability":"view","type":"function"}
];

let web3, contract, userAccount;

async function connect() {
    if (!window.ethereum) return alert("Установите MetaMask / Trust Wallet");
    try {
        const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAccount = accs[0];
        web3 = new Web3(window.ethereum);
        contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);

        document.getElementById('connBtn').classList.add('hidden');
        document.getElementById('addrDisplay').classList.remove('hidden');
        document.getElementById('addrDisplay').innerText = 
            userAccount.substring(0,6) + '...' + userAccount.substring(38);

        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Ошибка подключения");
    }
}

async function updateDashboard() {
    if (!userAccount) return;

    try {
        const data = await contract.methods.users(userAccount).call();
        const adminAddr = await contract.methods.admin().call();

        if (userAccount.toLowerCase() === adminAddr.toLowerCase()) {
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        if (data.exists) {
            document.getElementById('regArea').classList.add('hidden');
            document.getElementById('linkArea').classList.remove('hidden');

            document.getElementById('valLvl').innerText = data.level;
            document.getElementById('valBal').innerText = 
                parseFloat(web3.utils.fromWei(data.internalBalance || 0, 'ether')).toFixed(4) + " BNB";

            document.getElementById('inviterBox').classList.remove('hidden');
            const ref = data.referrer;
            document.getElementById('invAddr').innerText = 
                ref === '0x0000000000000000000000000000000000000000' ? 'None' : 
                ref.substring(0,8) + '...' + ref.substring(36);

            renderStructure(parseInt(data.level), parseInt(data.partnersCount || 0), parseInt(data.structureCount || 0));

            const partners = parseInt(data.partnersCount || 0);
            const linkInput = document.getElementById('refLink');
            const copyBtn = document.getElementById('copyBtn');

            if (partners >= 2) {
                linkInput.value = "LIMIT 2/2 REACHED";
                linkInput.style.color = "#ff6b6b";
                copyBtn.innerText = "❌ Limit Reached";
                copyBtn.disabled = true;
                copyBtn.style.background = "#222";
                copyBtn.style.color = "#666";
            } else {
                const link = window.location.origin + window.location.pathname + "?ref=" + userAccount;
                linkInput.value = link;
                linkInput.style.color = "#fff";
                copyBtn.disabled = false;
                copyBtn.innerText = "Copy Link";
                copyBtn.style.background = "linear-gradient(90deg, var(--neon), #00c8ff)";
                copyBtn.style.color = "#000";
            }
        }
    } catch(e) {
        console.error(e);
    }
}

function renderStructure(currentLevel, partnersCount, structureCount) {
    const container = document.getElementById('matrixBox');
    container.innerHTML = '';

    let remaining = structureCount;

    for (let lvl = 1; lvl <= 9; lvl++) {
        const slots = LEVEL_SLOTS[lvl];

        const header = document.createElement('div');
        header.className = 'lvl-header';
        header.innerHTML = `
            <span class="lvl-name">LEVEL ${lvl}</span>
            <span class="lvl-slots">${slots} SLOTS</span>
        `;
        container.appendChild(header);

        const dotsDiv = document.createElement('div');
        dotsDiv.className = 'dots';

        let filledThisLevel = 0;

        if (lvl === 1) {
            filledThisLevel = Math.min(partnersCount, slots);
        } else {
            filledThisLevel = Math.min(Math.floor(remaining / 2), slots);
            remaining = Math.max(0, remaining - filledThisLevel);
        }

        for (let i = 0; i < slots; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (i < filledThisLevel) dot.classList.add('active');
            dotsDiv.appendChild(dot);
        }

        container.appendChild(dotsDiv);

        if (lvl > currentLevel) {
            header.style.opacity = '0.45';
            dotsDiv.style.opacity = '0.35';
        }
    }
}

async function register() {
    if (!userAccount) return alert("Connect wallet first");

    let referrer = document.getElementById('refInput').value.trim();
    if (!referrer || !web3.utils.isAddress(referrer)) {
        referrer = '0x0000000000000000000000000000000000000000';
    }

    try {
        await contract.methods.register(referrer).send({
            from: userAccount,
            value: web3.utils.toWei('0.001', 'ether')
        });
        alert("Node activated!");
        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Error: " + (e.message || "Transaction rejected"));
    }
}

async function adminAdd() {
    if (!userAccount) return;
    const userAddr = document.getElementById('admU').value.trim();
    const refAddr = document.getElementById('admR').value.trim();

    if (!web3.utils.isAddress(userAddr) || !web3.utils.isAddress(refAddr)) {
        return alert("Invalid address");
    }

    try {
        await contract.methods.adminAddUser(userAddr, refAddr).send({ from: userAccount });
        alert("User added for free");
        updateDashboard();
    } catch(e) {
        alert("Error: " + e.message);
    }
}

function copy() {
    const input = document.getElementById('refLink');
    if (input.value.includes("LIMIT")) return;
    input.select();
    navigator.clipboard.writeText(input.value);
    alert("Link copied!");
}

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('ref')) {
        document.getElementById('refInput').value = params.get('ref');
    }
};
</script>
</body>
</html>
