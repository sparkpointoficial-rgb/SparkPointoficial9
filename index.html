<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoCapital — Private Access</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        :root {
            --primary: #00eaff;
            --accent: #ff00aa;
            --gold: #ffd700;
            --bg: #0a0a14;
            --card: rgba(20, 20, 40, 0.6);
            --border: rgba(0, 234, 255, 0.18);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0,234,255,0.08), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255,0,170,0.06), transparent 50%);
            color: #f0f4ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ticker {
            background: linear-gradient(90deg, #0f0f1f, #1a1a2e, #0f0f1f);
            color: var(--primary);
            font-weight: 600;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
        }
        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(0,234,255,0.4);
            animation: pulse 4s infinite alternate;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .logo span { font-size: 3.8rem; }
        @keyframes pulse {
            0% { opacity: 0.92; text-shadow: 0 0 20px rgba(0,234,255,0.3); }
            100% { opacity: 1; text-shadow: 0 0 40px rgba(0,234,255,0.6); }
        }

        .wallet-addr {
            font-size: 0.9rem;
            color: var(--gold);
            background: rgba(255,215,0,0.08);
            padding: 10px 18px;
            border-radius: 30px;
            margin: 16px auto 0;
            display: inline-block;
            border: 1px solid rgba(255,215,0,0.25);
            font-family: monospace;
            backdrop-filter: blur(8px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0;
        }
        .stat-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,234,255,0.12);
        }
        .stat-label { font-size: 0.78rem; color: #a0a0ff; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 1.7rem; font-weight: 700; color: var(--primary); }

        .matrix-box {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px 18px;
            margin: 24px 0;
            max-height: 540px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .matrix-box::-webkit-scrollbar { width: 5px; }
        .matrix-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; opacity: 0.5; }

        .lvl-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 28px 0 14px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .lvl-name { font-size: 1.1rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
        .lvl-slots { font-size: 0.85rem; color: #a0a0ff; }

        .dots {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
        }
        .dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #101022;
            border: 1px solid #202040;
            transition: all 0.5s ease;
        }
        .dot.active {
            background: linear-gradient(135deg, var(--primary), #00b8ff);
            box-shadow: 0 0 20px rgba(0,234,255,0.7), inset 0 0 8px rgba(255,255,255,0.4);
            border: none;
            transform: scale(1.12);
        }

        .box {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0;
        }
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            letter-spacing: 1px;
        }
        .btn-green {
            background: linear-gradient(90deg, var(--primary), #00c8ff);
            color: #000;
            box-shadow: 0 8px 25px rgba(0,234,255,0.35);
        }
        .btn-green:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(0,234,255,0.55);
        }
        .btn-tg {
            background: linear-gradient(90deg, #0088cc, #00aaff);
            color: white;
            margin-top: 12px;
            box-shadow: 0 8px 25px rgba(0,136,204,0.35);
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #303060;
            border-radius: 14px;
            color: #e0e0ff;
            margin: 12px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        .inviter-info {
            text-align: center;
            font-size: 0.95rem;
            color: #b0b0ff;
            margin: 20px 0;
            padding: 14px;
            border-radius: 16px;
            background: rgba(0,234,255,0.06);
            border: 1px solid var(--border);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="ticker">
    <span>CRYPTOCAPITAL — PRIVATE ROUND 2026 • LIMITED SLOTS • PRICE INCREASE SOON • CRYPTOCAPITAL — PRIVATE ROUND 2026 • LIMITED SLOTS • PRICE INCREASE SOON • </span>
</div>

<div class="container">
    <div class="header">
        <div class="logo"><span>₿</span> CRYPTOCAPITAL</div>
        <div id="addrDisplay" class="wallet-addr hidden">Not Connected</div>
        <button id="connBtn" class="btn btn-green" style="margin: 24px 0 12px;" onclick="connect()">Connect Wallet</button>
        <a href="https://t.me/spartpoint/32" target="_blank" class="btn btn-tg">📖 Payment Guide</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Current Level</span>
            <div class="stat-value" id="valLvl">-</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Internal Balance</span>
            <div class="stat-value" id="valBal">0.0000 BNB</div>
        </div>
    </div>

    <div class="matrix-box" id="matrixBox"></div>

    <div id="inviterBox" class="inviter-info hidden">
        Invited by: <br><span id="invAddr" style="color: var(--primary); font-family: monospace;"></span>
    </div>

    <div id="regArea" class="box">
        <label style="font-size: 0.9rem; color: #b0b0ff; display: block; margin-bottom: 8px;">REFERRER ADDRESS</label>
        <input type="text" id="refInput" placeholder="0x000...0000">
        <button class="btn btn-green" onclick="register()">Activate Access (0.001 BNB)</button>
    </div>

    <div id="linkArea" class="box hidden">
        <label style="font-size: 0.9rem; color: #b0b0ff; display: block; margin-bottom: 8px;">YOUR INVITE LINK (max 2)</label>
        <input type="text" id="refLink" readonly>
        <button id="copyBtn" class="btn btn-green" onclick="copy()">Copy Link 🔗</button>
    </div>

    <div id="adminPanel" class="box hidden" style="border-color: var(--gold);">
        <b style="color: var(--gold); display: block; margin-bottom: 12px;">ADMIN CONTROL</b>
        <input type="text" id="admU" placeholder="User Address (0x...)">
        <input type="text" id="admR" placeholder="Referrer Address (0x...)">
        <button class="btn" style="background: linear-gradient(90deg, var(--gold), #ffcc00); color: #000; margin-top: 12px;" onclick="adminAdd()">Add Free User</button>
    </div>
</div>

<script>
// ──────────────────────────────────────────────
// КОНФИГ УРОВНЕЙ (без изменений)
const LEVEL_SLOTS = [0, 2, 6, 14, 2, 6, 14, 2, 6, 14];

// ──────────────────────────────────────────────
const CONTRACT_ADDR = '0x2c4326c0577e8Ef8679B302eAd3603Df8224B7ed';
const ABI = [ /* твой оригинальный ABI без изменений */ 
    {"inputs":[{"internalType":"address","name":"_user","type":"address"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"adminAddUser","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"address","name":"_referrer","type":"address"}],"name":"register","outputs":[],"stateMutability":"payable","type":"function"},
    {"inputs":[],"name":"admin","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[
        {"internalType":"uint256","name":"level","type":"uint256"},
        {"internalType":"address","name":"referrer","type":"address"},
        {"internalType":"uint256","name":"partnersCount","type":"uint256"},
        {"internalType":"uint256","name":"structureCount","type":"uint256"},
        {"internalType":"uint256","name":"internalBalance","type":"uint256"},
        {"internalType":"bool","name":"exists","type":"bool"}
    ],"stateMutability":"view","type":"function"}
];

let web3, contract, userAccount;

async function connect() { /* без изменений */ 
    if (!window.ethereum) return alert("Установите MetaMask / Trust Wallet");
    try {
        const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAccount = accs[0];
        web3 = new Web3(window.ethereum);
        contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);

        document.getElementById('connBtn').classList.add('hidden');
        document.getElementById('addrDisplay').classList.remove('hidden');
        document.getElementById('addrDisplay').innerText = 
            userAccount.substring(0,6) + '...' + userAccount.substring(38);

        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Ошибка подключения");
    }
}

async function updateDashboard() { /* без изменений в логике */ 
    if (!userAccount) return;

    try {
        const data = await contract.methods.users(userAccount).call();
        const adminAddr = await contract.methods.admin().call();

        if (userAccount.toLowerCase() === adminAddr.toLowerCase()) {
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        if (data.exists) {
            document.getElementById('regArea').classList.add('hidden');
            document.getElementById('linkArea').classList.remove('hidden');

            document.getElementById('valLvl').innerText = data.level;
            document.getElementById('valBal').innerText = 
                parseFloat(web3.utils.fromWei(data.internalBalance || 0, 'ether')).toFixed(4) + " BNB";

            document.getElementById('inviterBox').classList.remove('hidden');
            const ref = data.referrer;
            document.getElementById('invAddr').innerText = 
                ref === '0x0000000000000000000000000000000000000000' ? 'None' : 
                ref.substring(0,8) + '...' + ref.substring(36);

            renderStructure(parseInt(data.level), parseInt(data.partnersCount || 0), parseInt(data.structureCount || 0));

            const partners = parseInt(data.partnersCount || 0);
            const linkInput = document.getElementById('refLink');
            const copyBtn = document.getElementById('copyBtn');

            if (partners >= 2) {
                linkInput.value = "LIMIT 2/2 REACHED";
                linkInput.style.color = "#ff6b6b";
                copyBtn.innerText = "❌ Limit Reached";
                copyBtn.disabled = true;
                copyBtn.style.background = "#222";
                copyBtn.style.color = "#666";
            } else {
                const link = window.location.origin + window.location.pathname + "?ref=" + userAccount;
                linkInput.value = link;
                linkInput.style.color = "#fff";
                copyBtn.disabled = false;
                copyBtn.innerText = "Copy Link 🔗";
                copyBtn.style.background = "linear-gradient(90deg, var(--primary), #00c8ff)";
                copyBtn.style.color = "#000";
            }
        }
    } catch(e) {
        console.error(e);
    }
}

function renderStructure(currentLevel, partnersCount, structureCount) {
    const container = document.getElementById('matrixBox');
    container.innerHTML = '';

    let remaining = structureCount;

    for (let lvl = 1; lvl <= 9; lvl++) {
        const slots = LEVEL_SLOTS[lvl];

        const header = document.createElement('div');
        header.className = 'lvl-header';
        header.innerHTML = `
            <span class="lvl-name">LEVEL ${lvl}</span>
            <span class="lvl-slots">${slots} SLOTS</span>
        `;
        container.appendChild(header);

        const dotsDiv = document.createElement('div');
        dotsDiv.className = 'dots';

        let filledThisLevel = 0;

        if (lvl === 1) {
            filledThisLevel = Math.min(partnersCount, slots);
        } else {
            // Имитация: на каждом следующем уровне заполняется примерно половина от remaining
            filledThisLevel = Math.min(Math.floor(remaining / 2), slots);
            remaining = Math.max(0, remaining - filledThisLevel);
        }

        for (let i = 0; i < slots; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (i < filledThisLevel) dot.classList.add('active');
            dotsDiv.appendChild(dot);
        }

        container.appendChild(dotsDiv);

        if (lvl > currentLevel) {
            header.style.opacity = '0.45';
            dotsDiv.style.opacity = '0.35';
        }
    }
}

// register, adminAdd, copy — без изменений
async function register() {
    if (!userAccount) return alert("Connect wallet first");

    let referrer = document.getElementById('refInput').value.trim();
    if (!referrer || !web3.utils.isAddress(referrer)) {
        referrer = '0x0000000000000000000000000000000000000000';
    }

    try {
        await contract.methods.register(referrer).send({
            from: userAccount,
            value: web3.utils.toWei('0.001', 'ether')
        });
        alert("Access activated!");
        updateDashboard();
    } catch(e) {
        console.error(e);
        alert("Error: " + (e.message || "Transaction rejected"));
    }
}

async function adminAdd() {
    if (!userAccount) return;
    const userAddr = document.getElementById('admU').value.trim();
    const refAddr = document.getElementById('admR').value.trim();

    if (!web3.utils.isAddress(userAddr) || !web3.utils.isAddress(refAddr)) {
        return alert("Invalid address");
    }

    try {
        await contract.methods.adminAddUser(userAddr, refAddr).send({ from: userAccount });
        alert("User added for free");
        updateDashboard();
    } catch(e) {
        alert("Error: " + e.message);
    }
}

function copy() {
    const input = document.getElementById('refLink');
    if (input.value.includes("LIMIT")) return;
    input.select();
    navigator.clipboard.writeText(input.value);
    alert("Link copied!");
}

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if (params.has('ref')) {
        document.getElementById('refInput').value = params.get('ref');
    }
};
</script>
</body>
</html>
